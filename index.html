<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Totem DPE-MA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET E VARIÁVEIS --- */
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: #f0f4f8; /* Fundo cinza super limpo */
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; 
            user-select: none; 
            display: flex;
            flex-direction: column;
            touch-action: none; 
            -ms-touch-action: none;
        }

        /* --- CABEÇALHO --- */
        .header {
            height: 10vh; /* Tamanho exato de 10% da tela */
            background: #003366;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 0.6vh solid #009640;
            box-shadow: 0 1vh 2vh rgba(0, 0, 0, 0.15);
            z-index: 20;
            flex-shrink: 0;
        }

        .header-logo { 
            height: 60%; 
            width: auto; 
        }

        /* --- BOTÃO REFRESH OCULTO --- */
        .refresh-btn {
            position: fixed; top: 0; right: 0; width: 8vw; height: 10vh;
            display: flex; justify-content: center; align-items: center;
            font-size: 3vh; color: rgba(255,255,255,0.05); cursor: pointer; z-index: 10000; 
        }
        .refresh-btn:active { background-color: rgba(255,0,0,0.3); }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-container {
            flex-grow: 1; 
            display: flex; 
            flex-direction: column;
            justify-content: center; /* Centraliza tudo verticalmente */
            align-items: center;
            width: 100%; 
            box-sizing: border-box;
            z-index: 10;
        }

        /* --- 1. MOLDURA DA FOTO (SEPARADA DO BOTÃO) --- */
        .carousel-wrapper {
            width: 85%; 
            height: 48vh; /* Altura ajustada para dar respiro aos outros itens */
            background: #ffffff; 
            padding: 1.5vh; 
            border-radius: 2.5vh; 
            box-shadow: 0 1.5vh 3vh rgba(0,0,0,0.08); 
            position: relative;
            box-sizing: border-box;
            margin-bottom: 4vh; /* ESPAÇO ENTRE A FOTO E O BOTÃO */
        }

        .carousel-images {
            width: 100%;
            height: 100%;
            border-radius: 1vh; 
            overflow: hidden;
            position: relative;
            background-color: #e0e0e0; 
        }

        .carousel-images img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: center 20%;
            opacity: 0; 
            transition: opacity 1s ease-in-out; 
        }

        .carousel-images img.active-image {
            opacity: 1;
        }

        /* --- 2. BOTÃO INICIAR ATENDIMENTO (SÓLIDO E SEGURO) --- */
        .cta-button {
            width: 85%; 
            height: 11vh; 
            background-color: #00b34d; 
            color: white; 
            border-radius: 5.5vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 2vw;
            box-shadow: 0 1vh 3vh rgba(0, 179, 77, 0.4);
            border: 0.6vh solid #ffffff; 
            cursor: pointer; 
            z-index: 20;
            animation: pulse-solid 2s infinite;
        }

        .cta-button span#btn-icon {
            font-size: 5vh; 
            animation: bounce 1s infinite alternate ease-in-out;
        }

        .cta-button span#btn-text {
            font-size: 3.0vh; 
            font-weight: 800; 
            text-transform: uppercase;
            white-space: nowrap; 
            letter-spacing: 0.1vw;
        }

        @keyframes pulse-solid {
            0% { transform: scale(1); box-shadow: 0 1vh 2vh rgba(0, 179, 77, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 2vh 4vh rgba(0, 179, 77, 0.6); }
            100% { transform: scale(1); box-shadow: 0 1vh 2vh rgba(0, 179, 77, 0.4); }
        }

        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-0.8vh); } }

        .cta-button:active { transform: scale(0.95) !important; animation: none; background-color: #009640; }

        /* --- 3. PÍLULA HÍBRIDA --- */
        .info-carousel {
            background: #ffffff;
            width: 90%; 
            height: 9vh; 
            border-radius: 4.5vh;
            padding: 0 4vw;
            box-shadow: 0 1vh 2vh rgba(0,0,0,0.05);
            display: flex; 
            justify-content: space-between; 
            align-items: center;    
            margin-top: 4vh; /* ESPAÇO ENTRE O BOTÃO E A PÍLULA */
            box-sizing: border-box;
        }

        .carousel-left {
            flex: 1; display: flex; align-items: center; overflow: hidden;
        }
        
        .info-text {
            color: #003366; 
            font-size: 1.4vh; 
            font-weight: 700; 
            white-space: nowrap; 
            display: flex; align-items: center; gap: 1vw;
            animation: fadeUp 0.5s ease-out;
        }
        
        .info-icon { color: #009640; font-size: 2vh; }
        
        .carousel-divider {
            width: 0.3vw; height: 4vh; background-color: rgba(0, 51, 102, 0.15); margin: 0 3vw;
        }
        
        .carousel-right {
            display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
        }
        
        .mini-clock { color: #003366; font-size: 2.3vh; font-weight: 800; line-height: 1; }
        .mini-date {
            color: #009640; font-size: 0.9vh; font-weight: 800; text-transform: uppercase;
            margin-top: 0.5vh; letter-spacing: 0.1vw;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(1vh); } to { opacity: 1; transform: translateY(0); } }

        /* --- 4. LETREIRO FIXO --- */
        .marquee-footer {
            width: 100%; 
            height: 6vh;
            background: #003366; 
            border-top: 0.5vh solid #009640;
            display: flex;
            align-items: center;
            overflow: hidden; 
            white-space: nowrap; 
            z-index: 300;
        }
        
        .marquee-content {
            display: inline-block; color: white; font-size: 2vh; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.2vw;
            animation: scroll-left 30s linear infinite; padding-left: 100%;
        }
        
        @keyframes scroll-left { to { transform: translate(-100%, 0); } }

        /* --- TELA DE CARREGAMENTO --- */
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #003366; z-index: 20000; flex-direction: column;
            justify-content: center; align-items: center; color: white;
        }
        .loader {
            border: 1vh solid rgba(255,255,255,0.2); border-top: 1vh solid #00b34d;
            border-radius: 50%; width: 10vh; height: 10vh; animation: spin 1s linear infinite; margin-bottom: 2vh;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <h3 style="font-size: 3vh;">INICIANDO...</h3>
    </div>

    <div class="refresh-btn" onclick="reiniciarSistema();">↻</div>

    <div class="header">
        <img src="https://defensoria.ma.def.br/static/img/logo-dpema-w.png" class="header-logo" alt="Logo DPE-MA">
    </div>

    <div class="main-container">
        
        <div class="carousel-wrapper">
            <div class="carousel-images" id="main-image-carousel">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20250519_103731.jpg" class="active-image" alt="Informativo 1">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20250519_105018.jpg" alt="Informativo 2">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20250519_104845.jpg" alt="Informativo 3">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20250519_110543.jpg" alt="Informativo 4">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/image000782.jpeg" alt="Informativo 6">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20250518_073315.jpg" alt="Informativo 7">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20241212092419.jpg" alt="Informativo 8">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20240815143300.jpg" alt="Informativo 9">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20241121093538_foto7.jpg" alt="Informativo 10">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20241212091444.jpg" alt="Informativo 11">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/IMG_1488.JPG" alt="Informativo 12">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/IMG_4196.jpg" alt="Informativo 13">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20240606160007.jpg" alt="Informativo 14">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20250519_103512.jpg" alt="Informativo 15">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20240815143300.jpg" alt="Informativo 16">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20240815143300_foto5.jpg" alt="Informativo 17">
                <img src="https://defensoria.ma.def.br/dpema/public/dpema_v2/thumbs/800x0/20241121111202_foto3.jpg" alt="Informativo 18">

            </div>
        </div>

        <div class="cta-button" id="btn-retirar" onclick="abrirSGA()">
            <span id="btn-icon">👆</span>
            <span id="btn-text">INICIAR ATENDIMENTO</span>
        </div>

        <div class="info-carousel">
            <div class="carousel-left">
                <div class="info-text" id="info-carousel-text">
                    <span class="info-icon">💡</span> Bem-vindo à Defensoria Pública
                </div>
            </div>
            <div class="carousel-divider"></div>
            <div class="carousel-right">
                <div class="mini-clock" id="mini-clock">00:00</div>
                <div class="mini-date" id="mini-date">---</div>
            </div>
        </div>
        
    </div>

    <div class="marquee-footer">
        <div class="marquee-content">
            DEFENSORIA PÚBLICA DO ESTADO DO MARANHÃO &nbsp; • &nbsp; GARANTIA DE DIREITOS &nbsp; • &nbsp; DISQUE 129 &nbsp; • &nbsp; JUSTIÇA GRATUITA E INTEGRAL
        </div>
    </div>

    <script>
        // PROTEÇÃO CONTRA ZOOM
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '0' || e.keyCode === 187 || e.keyCode === 189 || e.keyCode === 107 || e.keyCode === 109)) {
                e.preventDefault();
            }
        });
        document.addEventListener('wheel', function(e) { if (e.ctrlKey) { e.preventDefault(); } }, { passive: false });
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });


        function reiniciarSistema() {
            document.getElementById('loading-overlay').style.display = 'flex';
            setTimeout(function() { location.reload(true); }, 500);
        }

        // --- RELÓGIO ---
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const dateString = now.toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' }).replace('.', '').toUpperCase();
            
            document.getElementById('mini-clock').innerText = timeString;
            document.getElementById('mini-date').innerText = dateString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- MENSAGENS DA PÍLULA ---
        const mensagens = [
            "<span class='info-icon'>⚖️</span> Garantimos assistência jurídica gratuita",
            "<span class='info-icon'>📞</span> Dúvidas? Ligue para o Disque 129"
        ];
        let msgIndex = 0;
        function rotacionarMensagens() {
            const el = document.getElementById('info-carousel-text');
            el.style.opacity = 0; 
            setTimeout(() => {
                msgIndex = (msgIndex + 1) % mensagens.length;
                el.innerHTML = mensagens[msgIndex]; 
                el.style.animation = 'none';
                el.offsetHeight; 
                el.style.animation = 'fadeUp 0.5s ease-out'; 
                el.style.opacity = 1;
            }, 500);
        }
        setInterval(rotacionarMensagens, 6000);

        // --- ROTAÇÃO DE FOTOS ---
        const imageCarousel = document.getElementById('main-image-carousel');
        const images = imageCarousel.getElementsByTagName('img');
        let imgIndex = 0;

        function rotacionarImagens() {
            images[imgIndex].classList.remove('active-image');
            imgIndex = (imgIndex + 1) % images.length;
            images[imgIndex].classList.add('active-image');
        }
        setInterval(rotacionarImagens, 6000); 

        // --- AHK GATILHO ---
        function abrirSGA() {
            document.title = "::: ABRIR_SGA :::";
            setTimeout(function() { document.title = "Totem DPE-MA"; }, 3000);
        }
    </script>
</body>
</html>
